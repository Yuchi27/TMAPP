<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskOra — Shared Task</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/tasks.css">
  <link rel="stylesheet" href="../styles/sharing.css">
  <link rel="stylesheet" href="../styles/darkmode.css">
  <script src="../scripts/theme.js"></script>
  <style>
    html { height: auto; overflow: visible; }
    body {
      display: block;
      flex-direction: unset;
      height: auto;
      min-height: 100vh;
      overflow: visible;
      background: #f0f2f8;
    }

    .shared-page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .shared-bottom-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .shared-bottom-row > .comments-section {
      flex: 1;
      min-width: 0;
    }

    @media (max-width: 760px) {
      .shared-bottom-row {
        flex-direction: column;
      }
    }

    .shared-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .shared-logo {
      height: 38px;
    }

    .shared-badge {
      background: #6c63ff;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    .shared-task-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e8eaf0;
      margin-bottom: 20px;
    }

    .shared-task-card h2 {
      font-size: 20px;
      font-weight: 800;
      color: #1a2537;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .shared-task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .shared-task-notes {
      background: #f8f9fc;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #4a5570;
      line-height: 1.6;
      margin-top: 14px;
    }

    .shared-task-notes label {
      font-size: 11px;
      font-weight: 700;
      color: #8a9bb0;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .shared-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f0f2f8;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.done     { background: #27ae60; }
    .status-dot.pending  { background: #f5a623; }

    /* Comments section */
    .comments-section {
      background: #fff;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e8eaf0;
    }

    .comments-section h3 {
      font-size: 15px;
      font-weight: 800;
      color: #1a2537;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .permission-notice {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #7a5c00;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-prompt {
      background: #f0eeff;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: 16px;
    }

    .login-prompt p {
      font-size: 14px;
      color: #4a5570;
      margin-bottom: 12px;
    }

    .login-prompt a {
      background: #6c63ff;
      color: #fff;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
    }

    #shared-comments-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 520px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .shared-comment-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .shared-comment-input-row textarea {
      flex: 1;
      background: #f0f2f8;
      border: 1.5px solid #d0d8e8;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: #1a2537;
      outline: none;
      resize: none;
      font-family: 'Inter', sans-serif;
      min-height: 42px;
    }
    .shared-comment-input-row textarea:focus { border-color: #6c63ff; }

    #loading-msg {
      text-align: center;
      color: #8a9bb0;
      padding: 40px 0;
      font-size: 14px;
    }

    .shared-note-item {
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #e8eaf0;
    }
    .shared-note-item.c-yellow  { background: #fffde7; }
    .shared-note-item.c-blue    { background: #e3f2fd; }
    .shared-note-item.c-green   { background: #e8f5e9; }
    .shared-note-item.c-pink    { background: #fce4ec; }
    .shared-note-item.c-purple  { background: #ede7f6; }
    .shared-note-item.c-orange  { background: #fff3e0; }
    .shared-note-item.c-white   { background: #fff; }
    .shared-note-title {
      font-size: 13px;
      font-weight: 700;
      color: #1a2537;
      margin-bottom: 4px;
    }
    .shared-note-body {
      font-size: 13px;
      color: #4a5570;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .shared-note-item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .note-edit-btn {
      background: rgba(0,0,0,0.06);
      border: none;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 700;
      color: #1a2537;
      padding: 4px 9px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .note-edit-btn:hover { background: rgba(0,0,0,0.12); }
    .note-edit-form { display: flex; flex-direction: column; gap: 8px; }
    .note-edit-form textarea {
      min-height: 220px;
      resize: vertical;
    }
    .note-edit-form input,
    .note-edit-form textarea {
      width: 100%;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      background: rgba(255,255,255,0.6);
      outline: none;
      color: #1a2537;
    }
    .note-edit-form input:focus,
    .note-edit-form textarea:focus { border-color: #6c63ff; }
    .note-edit-form-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .note-edit-save, .note-edit-cancel {
      border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
      padding: 6px 12px; cursor: pointer;
    }
    .note-edit-save   { background: #1a2537; color: #fff; }
    .note-edit-save:hover { background: #243044; }
    .note-edit-cancel { background: rgba(0,0,0,0.06); color: #1a2537; }
    .note-edit-cancel:hover { background: rgba(0,0,0,0.12); }
    .add-note-btn {
      background: #f0f2f8; border: 1.5px dashed #d0d8e8; border-radius: 10px;
      font-size: 12px; font-weight: 700; color: #6c63ff;
      padding: 8px 12px; cursor: pointer; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 4px;
    }
    .add-note-btn:hover { background: #ebeefc; }

    .shared-note-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      background: rgba(0,0,0,0.06);
      color: #6b7a99;
      padding: 1px 7px;
      border-radius: 5px;
      margin-top: 6px;
    }

    .shared-task-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .st-edit-btn {
      background: #f0f2f8;
      border: none;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 700;
      color: #1a2537;
      padding: 7px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .st-edit-btn:hover { background: #e0e4f0; }
    .st-edit-fields { display: none; flex-direction: column; gap: 12px; margin-top: 14px; }
    .st-edit-fields.open { display: flex; }
    .st-edit-row { display: flex; gap: 10px; }
    .st-edit-row > div { flex: 1; }
    .st-edit-fields label {
      font-size: 11px; font-weight: 700; color: #8a9bb0;
      text-transform: uppercase; display: block; margin-bottom: 5px;
    }
    .st-edit-fields input,
    .st-edit-fields select,
    .st-edit-fields textarea {
      width: 100%;
      background: #f0f2f8;
      border: 1.5px solid #d0d8e8;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      color: #1a2537;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .st-edit-fields input:focus,
    .st-edit-fields select:focus,
    .st-edit-fields textarea:focus { border-color: #6c63ff; }
    .st-edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .st-save-btn {
      background: #1a2537; color: #fff; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; padding: 9px 18px; cursor: pointer;
    }
    .st-save-btn:hover { background: #243044; }
    .st-cancel-btn {
      background: #f0f2f8; color: #1a2537; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; padding: 9px 18px; cursor: pointer;
    }
    .st-cancel-btn:hover { background: #e0e4f0; }
    .st-saved-msg { font-size: 12px; color: #27ae60; font-weight: 700; }

    #error-msg {
      text-align: center;
      color: #e74c3c;
      padding: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="shared-page-wrap">
    <div class="shared-header">
      <img src="../icons/Frame 7.png" class="shared-logo" alt="TaskOra">
      <span class="shared-badge">Shared Task</span>
    </div>

    <div id="loading-msg"><i class="ti ti-loader" style="font-size:24px"></i><br>Loading shared task...</div>
    <div id="error-msg" style="display:none"></div>

    <div id="task-content" style="display:none">
      <div class="shared-task-card">
        <div class="shared-task-card-top">
          <h2 id="st-title" style="margin-bottom:0"></h2>
          <button class="st-edit-btn" id="st-edit-toggle" style="display:none" onclick="toggleEditTask()">
            <i class="ti ti-pencil"></i> Edit
          </button>
        </div>
        <div class="shared-task-meta" id="st-view-meta" style="margin-top:14px">
          <span class="priority-badge" id="st-priority"></span>
          <span class="cat-badge" id="st-category" style="display:none"></span>
          <span class="meta-item" id="st-deadline" style="display:none"><i class="ti ti-calendar" style="font-size:13px"></i> <span></span></span>
        </div>
        <div class="shared-status" id="st-view-status">
          <div class="status-dot" id="st-status-dot"></div>
          <span id="st-status-text"></span>
        </div>
        <div class="shared-task-notes" id="st-notes-wrap" style="display:none">
          <label>Notes</label>
          <div id="st-notes"></div>
        </div>

        <div class="st-edit-fields" id="st-edit-fields">
          <div class="fld">
            <label>Task Title</label>
            <input type="text" id="st-edit-title">
          </div>
          <div class="st-edit-row">
            <div>
              <label>Priority</label>
              <select id="st-edit-priority">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>
            <div>
              <label>Category</label>
              <select id="st-edit-category">
                <option value="Personal">Personal</option>
                <option value="School">School</option>
                <option value="Work">Work</option>
                <option value="Church">Church</option>
              </select>
            </div>
          </div>
          <div class="st-edit-row">
            <div>
              <label>Deadline</label>
              <input type="datetime-local" id="st-edit-deadline">
            </div>
            <div>
              <label>Status</label>
              <select id="st-edit-status">
                <option value="todo">In Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>
          <div class="fld">
            <label>Notes</label>
            <textarea id="st-edit-notes" rows="2"></textarea>
          </div>
          <div class="st-edit-actions">
            <span class="st-saved-msg" id="st-saved-msg"></span>
            <button class="st-cancel-btn" onclick="toggleEditTask(false)">Cancel</button>
            <button class="st-save-btn" onclick="saveTaskEdit()">Save Changes</button>
          </div>
        </div>
      </div>

      <div class="shared-bottom-row">
        <div class="comments-section" id="linked-notes-section" style="display:none;">
          <h3><i class="ti ti-notes"></i> Notes</h3>
          <div id="shared-notes-list" style="display:flex; flex-direction:column; gap:10px; max-height:520px; overflow-y:auto; margin-bottom:10px;"></div>
          <button class="add-note-btn" id="add-note-btn" style="display:none" onclick="addLinkedNote()">
            <i class="ti ti-plus"></i> Add Note
          </button>
        </div>

        <div class="comments-section">
          <h3><i class="ti ti-message-circle"></i> Comments</h3>

        <div class="permission-notice" id="perm-notice" style="display:none">
          <i class="ti ti-info-circle"></i>
          <span id="perm-notice-text"></span>
        </div>

        <div id="shared-comments-list">
          <div class="comments-empty">No comments yet.</div>
        </div>

        <div id="comment-input-area" style="display:none">
          <div class="shared-comment-input-row">
            <textarea id="shared-comment-input" placeholder="Write a comment..."
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postSharedComment();}"></textarea>
            <button class="btn-send-comment" onclick="postSharedComment()"><i class="ti ti-send"></i></button>
          </div>
        </div>

        <div class="login-prompt" id="login-prompt" style="display:none">
          <p>Sign in to TaskOra to leave a comment.</p>
          <a href="auth.html">Sign In</a>
        </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "../scripts/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      doc, getDoc, collection, query, orderBy,
      onSnapshot, addDoc, serverTimestamp, updateDoc,
      arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const params   = new URLSearchParams(location.search);
    const taskId   = params.get("task");
    const ownerUid = params.get("owner");

    const REACTIONS = ["👍", "❤️", "😂", "😮", "🔥", "✅"];

    function encodeEmoji(e) {
      return [...e].map(c => c.codePointAt(0).toString(16)).join("_");
    }

    function formatDeadline(ts) {
      if (!ts) return "";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString("en-US", { weekday: "short", month: "long", day: "numeric", year: "numeric" })
        + " at " + d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
    }

    if (!taskId || !ownerUid) {
      document.getElementById("loading-msg").style.display = "none";
      document.getElementById("error-msg").style.display = "block";
      document.getElementById("error-msg").textContent = "Invalid share link.";
    } else {
      onAuthStateChanged(auth, async (user) => {
        try {
          // Load task
          const taskSnap = await getDoc(doc(db, "users", ownerUid, "tasks", taskId));
          if (!taskSnap.exists()) throw new Error("Task not found or no longer shared.");

          const task = { id: taskSnap.id, ...taskSnap.data() };

          // Check permission
          let permission = "view"; // default for link-based sharing
          if (user) {
            const shareSnap = await getDoc(doc(db, "users", ownerUid, "tasks", taskId, "shares", user.uid));
            if (shareSnap.exists()) permission = shareSnap.data().permission;
            // Owner has full access
            if (user.uid === ownerUid) permission = "full";
          }

          // Render task
          document.getElementById("loading-msg").style.display = "none";
          document.getElementById("task-content").style.display = "block";

          document.getElementById("st-title").textContent = task.title;
          document.title = `${task.title} — TaskOra`;

          const pb = document.getElementById("st-priority");
          pb.textContent = task.priority;
          pb.className   = `priority-badge ${task.priority}`;

          if (task.category) {
            const cb = document.getElementById("st-category");
            cb.style.display = "flex";
            cb.innerHTML = `<i class="ti ti-user" style="font-size:11px"></i> ${task.category}`;
          }

          if (task.deadline) {
            const db2 = document.getElementById("st-deadline");
            db2.style.display = "flex";
            db2.querySelector("span").textContent = formatDeadline(task.deadline);
          }

          const isDone = task.status === "completed";
          document.getElementById("st-status-dot").className = `status-dot ${isDone ? "done" : "pending"}`;
          document.getElementById("st-status-text").textContent = isDone ? "Completed" : "In Progress";

          if (task.notes) {
            document.getElementById("st-notes-wrap").style.display = "block";
            document.getElementById("st-notes").textContent = task.notes;
          }

          // Show Edit button kung naa edit/full permission
          if (["edit","full"].includes(permission)) {
            document.getElementById("st-edit-toggle").style.display = "flex";
          }

          window.toggleEditTask = (open = true) => {
            const fields = document.getElementById("st-edit-fields");
            if (open) {
              document.getElementById("st-edit-title").value    = task.title || "";
              document.getElementById("st-edit-priority").value = task.priority || "Medium";
              document.getElementById("st-edit-category").value = task.category || "Personal";
              document.getElementById("st-edit-status").value   = task.status === "completed" ? "completed" : "todo";
              document.getElementById("st-edit-notes").value    = task.notes || "";
              if (task.deadline) {
                const d = task.deadline.toDate ? task.deadline.toDate() : new Date(task.deadline);
                const pad = n => String(n).padStart(2, "0");
                document.getElementById("st-edit-deadline").value =
                  `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
              } else {
                document.getElementById("st-edit-deadline").value = "";
              }
              fields.classList.add("open");
              document.getElementById("st-view-meta").style.display = "none";
              document.getElementById("st-view-status").style.display = "none";
            } else {
              fields.classList.remove("open");
              document.getElementById("st-view-meta").style.display = "flex";
              document.getElementById("st-view-status").style.display = "flex";
            }
          };

          window.saveTaskEdit = async () => {
            const title    = document.getElementById("st-edit-title").value.trim();
            const priority = document.getElementById("st-edit-priority").value;
            const category = document.getElementById("st-edit-category").value;
            const status   = document.getElementById("st-edit-status").value;
            const notesVal = document.getElementById("st-edit-notes").value;
            const dlVal    = document.getElementById("st-edit-deadline").value;

            if (!title) return;

            const msg = document.getElementById("st-saved-msg");
            msg.textContent = "Saving...";

            try {
              await updateDoc(doc(db, "users", ownerUid, "tasks", taskId), {
                title, priority, category, status,
                notes: notesVal,
                deadline: dlVal ? new Date(dlVal) : null,
                updatedAt: serverTimestamp()
              });

              // Update local copy + view
              task.title = title; task.priority = priority; task.category = category;
              task.status = status; task.notes = notesVal;
              task.deadline = dlVal ? new Date(dlVal) : null;

              document.getElementById("st-title").textContent = title;
              document.title = `${title} — TaskOra`;
              document.getElementById("st-priority").textContent = priority;
              document.getElementById("st-priority").className   = `priority-badge ${priority}`;

              const cb = document.getElementById("st-category");
              cb.style.display = "flex";
              cb.innerHTML = `<i class="ti ti-user" style="font-size:11px"></i> ${category}`;

              const dbEl = document.getElementById("st-deadline");
              if (dlVal) {
                dbEl.style.display = "flex";
                dbEl.querySelector("span").textContent = formatDeadline(new Date(dlVal));
              } else {
                dbEl.style.display = "none";
              }

              const isDone2 = status === "completed";
              document.getElementById("st-status-dot").className = `status-dot ${isDone2 ? "done" : "pending"}`;
              document.getElementById("st-status-text").textContent = isDone2 ? "Completed" : "In Progress";

              if (notesVal) {
                document.getElementById("st-notes-wrap").style.display = "block";
                document.getElementById("st-notes").textContent = notesVal;
              } else {
                document.getElementById("st-notes-wrap").style.display = "none";
              }

              msg.textContent = "Saved!";
              setTimeout(() => {
                msg.textContent = "";
                window.toggleEditTask(false);
              }, 700);
            } catch (err) {
              console.error(err);
              msg.textContent = "Error saving";
            }
          };


          // Load linked Notes (from the owner's Notes tab, filtered by taskId)
          const canEditNotes = ["edit","full"].includes(permission);
          let editingNoteId = null;

          function escN(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

          function renderNotes(linked) {
            const section = document.getElementById("linked-notes-section");
            const list    = document.getElementById("shared-notes-list");
            const addBtn  = document.getElementById("add-note-btn");

            addBtn.style.display = canEditNotes ? "flex" : "none";

            if (!linked.length && !canEditNotes) {
              section.style.display = "none";
              return;
            }
            section.style.display = "block";

            list.innerHTML = linked.map(n => {
              if (n.id === editingNoteId) {
                return `
                  <div class="shared-note-item ${n.color || "c-yellow"}">
                    <div class="note-edit-form">
                      <input type="text" id="note-edit-title-${n.id}" value="${escN(n.title || "")}" placeholder="Title">
                      <textarea id="note-edit-body-${n.id}" rows="10" placeholder="Write your note...">${escN(n.body || "")}</textarea>
                      <div class="note-edit-form-actions">
                        <button class="note-edit-cancel" onclick="cancelEditNote()">Cancel</button>
                        <button class="note-edit-save" onclick="saveLinkedNote('${n.id}')">Save</button>
                      </div>
                    </div>
                  </div>`;
              }
              return `
                <div class="shared-note-item ${n.color || "c-yellow"}">
                  <div class="shared-note-item-top">
                    <div class="shared-note-title">${escN(n.title || "Untitled")}</div>
                    ${canEditNotes ? `<button class="note-edit-btn" onclick="startEditNote('${n.id}')"><i class="ti ti-pencil"></i> Edit</button>` : ""}
                  </div>
                  <div class="shared-note-body">${escN(n.body || "")}</div>
                  ${n.tag ? `<span class="shared-note-tag">${escN(n.tag)}</span>` : ""}
                </div>`;
            }).join("") || (canEditNotes ? `<div class="comments-empty">No notes yet for this task.</div>` : "");
          }

          let lastLinkedNotes = [];

          try {
            const notesColRef = collection(db, "users", ownerUid, "notes");
            const notesQ      = query(notesColRef, orderBy("updatedAt", "desc"));
            onSnapshot(notesQ, (snap) => {
              lastLinkedNotes = snap.docs
                .map(d => ({ id: d.id, ...d.data() }))
                .filter(n => n.taskId === taskId);
              renderNotes(lastLinkedNotes);
            }, err => {
              console.log("Linked notes load skipped:", err.message);
            });
          } catch (e) {
            console.log("Linked notes setup skipped:", e.message);
          }

          window.startEditNote = (noteId) => {
            editingNoteId = noteId;
            renderNotes(lastLinkedNotes);
          };

          window.cancelEditNote = () => {
            editingNoteId = null;
            renderNotes(lastLinkedNotes);
          };

          window.saveLinkedNote = async (noteId) => {
            const title = document.getElementById(`note-edit-title-${noteId}`).value.trim();
            const body  = document.getElementById(`note-edit-body-${noteId}`).value;
            try {
              await updateDoc(doc(db, "users", ownerUid, "notes", noteId), {
                title: title || "Untitled",
                body,
                updatedAt: serverTimestamp()
              });
              editingNoteId = null;
            } catch (err) {
              console.error(err);
              alert("Couldn't save note: " + err.message);
            }
          };

          window.addLinkedNote = async () => {
            try {
              const ref = await addDoc(collection(db, "users", ownerUid, "notes"), {
                title: "Untitled",
                body: "",
                tag: "",
                color: "c-yellow",
                taskId,
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp()
              });
              editingNoteId = ref.id;
            } catch (err) {
              console.error(err);
              alert("Couldn't add note: " + err.message);
            }
          };



          // Permission notice
          if (user && permission !== "full") {
            const notices = {
              view:    "You have view-only access to this task.",
              comment: "You can view and comment on this task.",
              edit:    "You can view, comment, and edit this task."
            };
            if (notices[permission]) {
              document.getElementById("perm-notice").style.display = "flex";
              document.getElementById("perm-notice-text").textContent = notices[permission];
            }
          }

          // Comment input visibility
          if (!user) {
            document.getElementById("login-prompt").style.display = "block";
          } else if (["comment","edit","full"].includes(permission)) {
            document.getElementById("comment-input-area").style.display = "block";
          }

          // Load comments real-time
          const commentsRef = collection(db, "users", ownerUid, "tasks", taskId, "comments");
          const q = query(commentsRef, orderBy("createdAt", "asc"));

          onSnapshot(q, (snap) => {
            const comments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            const list = document.getElementById("shared-comments-list");
            const me   = user?.uid;

            if (!comments.length) {
              list.innerHTML = `<div class="comments-empty">No comments yet. Be the first!</div>`;
              return;
            }

            list.innerHTML = comments.map(c => {
              const isMe = c.authorUid === me;
              const time = c.createdAt?.toDate
                ? c.createdAt.toDate().toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })
                : "";

              const reactionHtml = REACTIONS.map(emoji => {
                const users2 = c.reactions?.[encodeEmoji(emoji)] || [];
                const count  = users2.length;
                const reacted = me && users2.includes(me);
                const canReact = me && ["comment","edit","full"].includes(permission);
                return canReact
                  ? `<button class="reaction-btn ${reacted ? "reacted" : ""}" onclick="toggleReaction('${c.id}','${emoji}')">
                      ${emoji}${count ? ` <span>${count}</span>` : ""}
                    </button>`
                  : (count ? `<span class="reaction-btn reacted">${emoji} <span>${count}</span></span>` : "");
              }).join("");

              return `
                <div class="comment-item ${isMe ? "mine" : ""}">
                  <div class="comment-avatar"><i class="ti ti-user"></i></div>
                  <div class="comment-body">
                    <div class="comment-meta">
                      <span class="comment-author">${c.authorName || "User"}</span>
                      <span class="comment-time">${time}</span>
                    </div>
                    <div class="comment-text">${String(c.text||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}</div>
                    <div class="comment-reactions">${reactionHtml}</div>
                  </div>
                </div>`;
            }).join("");

            list.scrollTop = list.scrollHeight;
          });

          // Post comment
          window.postSharedComment = async () => {
            if (!user) return;
            const input = document.getElementById("shared-comment-input");
            const text  = input.value.trim();
            if (!text) return;

            await addDoc(collection(db, "users", ownerUid, "tasks", taskId, "comments"), {
              text,
              authorUid:  user.uid,
              authorName: user.displayName || user.email?.split("@")[0] || "User",
              reactions:  {},
              createdAt:  serverTimestamp()
            });
            input.value = "";
          };

          // Toggle reaction
          window.toggleReaction = async (commentId, emoji) => {
            if (!user) return;
            const me2 = user.uid;
            const ref  = doc(db, "users", ownerUid, "tasks", taskId, "comments", commentId);
            const snap2 = await getDoc(ref);
            if (!snap2.exists()) return;
            const reactions = snap2.data().reactions || {};
            const key       = encodeEmoji(emoji);
            const users3    = reactions[key] || [];
            await updateDoc(ref, {
              [`reactions.${key}`]: users3.includes(me2) ? arrayRemove(me2) : arrayUnion(me2)
            });
          };

        } catch (err) {
          document.getElementById("loading-msg").style.display = "none";
          document.getElementById("error-msg").style.display = "block";
          document.getElementById("error-msg").textContent = err.message;
        }
      });
    }
  </script>
</body>
</html>
