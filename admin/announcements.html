<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMAPP — Announcements</title>
  <meta name="theme-color" content="#1a2537">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TMAPP">
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/dashboard.css">
  <link rel="stylesheet" href="../styles/admin.css">
  <link rel="stylesheet" href="../styles/darkmode.css">
  <link rel="stylesheet" href="../styles/responsive.css">
  <script src="../scripts/loader.js"></script>
  <script src="../scripts/theme.js"></script>
</head>
<body>

  <div id="loader"><div class="spinner"></div></div>

  <div class="topbar">
    <div class="logo">[ADMIN]</div>
    <div class="page-title">Announcements</div>
    <div class="topbar-right">
      <button class="notif-btn"><i class="ti ti-bell"></i></button>
      <div class="avatar"><i class="ti ti-user"></i></div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <nav>
        <a href="dashboard.html"><i class="ti ti-layout-dashboard"></i> Dashboard</a>
        <a href="users.html"><i class="ti ti-users"></i> Manage Users</a>
        <a href="announcements.html" class="active"><i class="ti ti-speakerphone"></i> Announcements</a>
      </nav>
      <div class="sidebar-bottom">
        <a href="../pages/dashboard.html" id="go-to-app"><i class="ti ti-arrow-left"></i> Go to App</a>
        <a href="" id="logout-btn"><i class="ti ti-logout"></i> Sign out</a>
      </div>
      <div class="sidebar-footer">© 2026 — Archie L. Agui Jr.. All rights reserved.</div>
    </aside>

    <main class="main">

<div class="ann-container">

    <!-- POST ANNOUNCEMENT -->
     
    <div class="panel light post-panel" >
        <h3>
            <i class="ti ti-speakerphone"></i> Post Announcement
        </h3>

        <div class="fld">
            <label>Title</label>
            <input type="text" id="ann-title" placeholder="Announcement title...">
        </div>

        <div class="fld">
            <label>Message</label>
            <textarea id="ann-body" rows="4" placeholder="Write your announcement here..."></textarea>
        </div>

        <div class="fld">
            <label>Type</label>
            <select id="ann-type">
                <option value="info">ℹ️ Info</option>
                <option value="warning">⚠️ Warning</option>
                <option value="success">✅ Success</option>
                <option value="urgent">🚨 Urgent</option>
            </select>
        </div>

        <button class="btn-save" id="post-ann-btn" >
            <i class="ti ti-send"></i> Post to All Users
        </button>

        <div id="ann-msg"></div>
    </div> <!-- <-- IMPORTANT: gi-close diri -->



    <!-- ALL ANNOUNCEMENTS -->
    <div class="panel panel-announcements">

        <div class="panel-header">
            <span><span class="dot green"></span> All Announcements</span>
        </div>

        <div id="ann-list" class="ann-list">
            <p class="panel-empty">No announcements yet</p>
        </div>

    </div>

</div>

    </main>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html"><i class="ti ti-layout-dashboard"></i> Home</a>
    <a href="users.html"><i class="ti ti-users"></i> Users</a>
    <a href="announcements.html" class="active"><i class="ti ti-speakerphone"></i> Announce</a>
    <a href="../pages/dashboard.html" id="go-to-app-mobile"><i class="ti ti-arrow-left"></i> App</a>
  </nav>

  <script src="../scripts/pwa.js"></script>
  <script type="module" src="../scripts/admin-announcements.js"></script>
</body>
</html>
